<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPA & CGPA Calculator</title>
    <link rel="stylesheet" href="style.css">

    <!--  Google Analytics Code (INSERTED HERE) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZMFFYLDTPJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZMFFYLDTPJ');
    </script>

</head>
<body>

<h1>GPA & CGPA Calculator 🎓</h1>

<div class="container">

    <!-- Mode Selection -->
    <div class="card">
        <h2>Select Mode</h2>
        <button onclick="showSection('semester')">Semester GPA</button>
        <button onclick="showSection('cgpa')">CGPA</button>
    </div>

    <!-- Semester GPA -->
    <div id="semester" class="card hidden">
        <h2>Semester GPA</h2>
        <div id="subjects"></div>
        <button onclick="addSubject()">Add Subject</button>
        <button onclick="calcGPA()">Calculate GPA</button>
        <button onclick="transferToCGPA()">Add to CGPA</button>
        <p id="gpaResult"></p>
    </div>

    <!-- CGPA -->
    <div id="cgpa" class="card hidden">
        <h2>CGPA Calculator</h2>
        <div id="semesters"></div>
        <button onclick="addSemester()">Add Semester Manually</button>
        <button onclick="calcCGPA()">Calculate CGPA</button>
        <p id="cgpaResult"></p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
